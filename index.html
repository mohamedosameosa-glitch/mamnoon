async function loadKey(key, fallback) {
  try {
    const r = await window.storage.get(key, true);
    if (r && r.value) return JSON.parse(r.value);
    return fallback;
  } catch (e) { return fallback; }
}
async function saveKey(key, value) {
  try { await window.storage.set(key, JSON.stringify(value), true); return true; }
  catch (e) { console.error('save failed', key, e); return false; }
}

const PACKAGES = {
  basic: { id: 'basic', label: 'الباقة الأساسية', sessions: 4, price: 250 },
  intensive: { id: 'intensive', label: 'الباقة المكثفة', sessions: 8, price: 350 },
};

function pkgOf(key) { return PACKAGES[key] || PACKAGES.basic; }

function teacherSplit(teacher, pkgKey) {
  const pkg = pkgOf(pkgKey);
  const pct = teacher ? teacher.sharePercent : 60;
  const teacherShare = Math.round((pkg.price * pct) / 100);
  return { total: pkg.price, teacherShare, academyShare: pkg.price - teacherShare, sessions: pkg.sessions };
}

/* ============================================================
   ID / CREDENTIAL / DATE HELPERS
   ============================================================ */
function uid(prefix) { return `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 7)}`; }

function genPassword() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let out = '';
  for (let i = 0; i < 6; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
}

function slugFromName(name) {
  return name.trim().split(/\s+/)[0]
    .replace(/[إأآا]/g, 'a').replace(/[ىي]/g, 'y').replace(/ة/g, 'a')
    .replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').toLowerCase() || 'user';
}

function genEmail(name, domain, existingEmails) {
  const base = slugFromName(name);
  let email = `${base}@${domain}`;
  let n = 1;
  while (existingEmails.includes(email)) { email = `${base}${n}@${domain}`; n++; }
  return email;
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('ar-EG', { day: 'numeric', month: 'short', year: 'numeric' });
}
function formatDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('ar-EG', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function daysSince(iso) {
  if (!iso) return Infinity;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
function addDays(iso, days) {
  const d = new Date(iso);
  d.setDate(d.getDate() + days);
  return d.toISOString();
}
function paymentStatus(student) {
  if (!student.lastPaymentDate) return 'due';
  const elapsed = daysSince(student.lastPaymentDate);
  if (elapsed <= 30) return 'paid';
  if (elapsed <= 35) return 'grace';
  return 'overdue';
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [students, setStudents] = useState([]);
  const [teachers, setTeachers] = useState([]);
  const [parents, setParents] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [payments, setPayments] = useState([]);
  const [loaded, setLoaded] = useState(false);

  const [view, setView] = useState('landing');
  const [currentUser, setCurrentUser] = useState(null);
  const [loginRole, setLoginRole] = useState('admin');

  useEffect(() => {
    (async () => {
      const meta = await loadKey(SK.META, null);
      if (!meta) {
        const seed = seedAll();
        setTeachers(seed.teachers); setParents(seed.parents); setStudents(seed.students);
        setSessions(seed.sessions); setPayments(seed.payments);
        await Promise.all([
          saveKey(SK.TEACHERS, seed.teachers), saveKey(SK.PARENTS, seed.parents),
          saveKey(SK.STUDENTS, seed.students), saveKey(SK.SESSIONS, seed.sessions),
          saveKey(SK.PAYMENTS, seed.payments), saveKey(SK.META, { seeded: true, at: new Date().toISOString() }),
        ]);
      } else {
        const [st, te, pa, se, pay] = await Promise.all([
          loadKey(SK.STUDENTS, []), loadKey(SK.TEACHERS, []), loadKey(SK.PARENTS, []),
          loadKey(SK.SESSIONS, []), loadKey(SK.PAYMENTS, []),
        ]);
        setStudents(st); setTeachers(te); setParents(pa); setSessions(se); setPayments(pay);
      }
      setLoaded(true);
    })();
  }, []);

  useEffect(() => { if (loaded) saveKey(SK.STUDENTS, students); }, [students, loaded]);
  useEffect(() => { if (loaded) saveKey(SK.TEACHERS, teachers); }, [teachers, loaded]);
  useEffect(() => { if (loaded) saveKey(SK.PARENTS, parents); }, [parents, loaded]);
  useEffect(() => { if (loaded) saveKey(SK.SESSIONS, sessions); }, [sessions, loaded]);
  useEffect(() => { if (loaded) saveKey(SK.PAYMENTS, payments); }, [payments, loaded]);

  const handleLogout = useCallback(() => { setCurrentUser(null); setView('landing'); }, []);

  if (!loaded) {
    return (
      <div style={{ minHeight: '100vh', background: COLORS.bg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <SealMark size={40} pct={60} animate />
      </div>
    );
  }

  return (
    <div dir="rtl" style={{ fontFamily: "'Tajawal','IBM Plex Sans Arabic',sans-serif", minHeight: '100vh' }}>
      <style>{GLOBAL_CSS}</style>
      {view === 'landing' && <Landing onEnter={() => setView('login')} />}
      {view === 'login' && (
        <LoginScreen
          role={loginRole} setRole={setLoginRole}
          teachers={teachers} parents={parents}
          onBack={() => setView('landing')}
          onLogin={(role, user) => { setCurrentUser(user); setView(role); }}
        />
      )}
      {view === 'admin' && currentUser && (
        <AdminDashboard
          students={students} setStudents={setStudents}
          teachers={teachers} setTeachers={setTeachers}
          parents={parents} setParents={setParents}
          sessions={sessions} setSessions={setSessions}
          payments={payments} setPayments={setPayments}
          onLogout={handleLogout}
        />
      )}
      {view === 'teacher' && currentUser && (
        <TeacherDashboard
          teacher={currentUser} students={students} setStudents={setStudents}
          sessions={sessions} setSessions={setSessions} onLogout={handleLogout}
        />
      )}
      {view === 'parent' && currentUser && (
        <ParentDashboard
          parent={currentUser} students={students} teachers={teachers}
          payments={payments} sessions={sessions} onLogout={handleLogout}
        />
      )}
    </div>
  );
}

/* ============================================================
   SIGNATURE ELEMENT — the Seal (الختم)
   "مكنون" = sealed/preserved with care. Progress is shown as a
   wax-seal medallion that fills in concentric rings as pages
   are memorized, with the academy mark at its center once complete.
   ============================================================ */
function SealMark({ size = 64, pct = 0, animate = false, label }) {
  const r1 = size * 0.46;
  const r2 = size * 0.36;
  const c1 = 2 * Math.PI * r1;
  const c2 = 2 * Math.PI * r2;
  const cx = size / 2, cy = size / 2;
  return (
    <div style={{ textAlign: 'center' }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={animate ? { animation: 'sealPulse 1.8s ease-in-out infinite' } : undefined}>
        <circle cx={cx} cy={cy} r={r1} fill="none" stroke={COLORS.border} strokeWidth={size * 0.045} opacity={0.5} />
        <circle
          cx={cx} cy={cy} r={r1} fill="none" stroke={COLORS.gold} strokeWidth={size * 0.045}
          strokeDasharray={c1} strokeDashoffset={c1 - (Math.min(pct, 100) / 100) * c1}
          strokeLinecap="round" transform={`rotate(-90 ${cx} ${cy})`}
          style={{ transition: 'stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)' }}
        />
        <circle cx={cx} cy={cy} r={r2} fill="none" stroke={COLORS.border} strokeWidth={1} strokeDasharray="2,3" opacity={0.6} />
        <text x={cx} y={cy + size * 0.06} textAnchor="middle" fill={COLORS.cream} fontSize={size * 0.22} fontWeight="800">
          {Math.round(pct)}%
        </text>
      </svg>
      {label && <div style={{ fontSize: size * 0.16, color: COLORS.creamDim, marginTop: 4 }}>{label}</div>}
    </div>
  );
}

   ============================================================ */
function LoginScreen({ role, setRole, teachers, parents, onBack, onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState('');

  const roleConfig = {
    admin: { label: 'الأدمن', icon: ShieldCheck, hint: 'بيانات حساب مالك الأكاديمية' },
    teacher: { label: 'المعلم', icon: GraduationCap, hint: 'البريد وكلمة السر اللي أرسلهم الأدمن لك' },
    parent: { label: 'ولي الأمر', icon: UserCircle, hint: 'البريد وكلمة السر اللي أرسلهم الأدمن لك' },
  };

  function handleSubmit(e) {
    e.preventDefault();
    setError('');
    const em = email.trim().toLowerCase();

    if (role === 'admin') {
      if (em === 'admin@mamnoon.com' && password === 'Mamnoon@2026') {
        onLogin('admin', { id: 'admin', name: 'الأدمن' });
      } else setError('بيانات الدخول غير صحيحة');
      return;
    }
    if (role === 'teacher') {
      const t = teachers.find(t => t.email.toLowerCase() === em && t.password === password);
      if (t) onLogin('teacher', t); else setError('البريد أو كلمة السر غير صحيحة');
      return;
    }
    if (role === 'parent') {
      const p = parents.find(p => p.email.toLowerCase() === em && p.password === password);
      if (p) onLogin('parent', p); else setError('البريد أو كلمة السر غير صحيحة');
      return;
    }
  }

  return (
    <div style={{ background: COLORS.bg, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ width: '100%', maxWidth: 420 }}>
        <button onClick={onBack} className="focus-ring" style={{ background: 'none', border: 'none', color: '#a8a092', display: 'flex', alignItems: 'center', gap: 6, marginBottom: 26, cursor: 'pointer', fontSize: 14, padding: 4 }}>
          <ArrowLeft size={16} style={{ transform: 'scaleX(-1)' }} /> رجوع للموقع
        </button>

        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 30 }}><BrandLockup size={24} /></div>

        <div style={{ display: 'flex', gap: 6, background: 'rgba(255,255,255,0.04)', borderRadius: 12, padding: 5, marginBottom: 22 }}>
          {Object.entries(roleConfig).map(([key, cfg]) => (
            <button key={key} onClick={() => { setRole(key); setError(''); }} className="focus-ring" style={{
              flex: 1, padding: '10px 8px', borderRadius: 9, border: 'none', cursor: 'pointer',
              background: role === key ? COLORS.gold : 'transparent', color: role === key ? COLORS.bg : '#cfc6b3',
              fontWeight: 700, fontSize: 13.5, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, transition: 'all .15s',
            }}><cfg.icon size={15} /> {cfg.label}</button>
          ))}
        </div>

        <form onSubmit={handleSubmit} style={{ background: 'rgba(255,255,255,0.03)', border: `1px solid ${COLORS.border}`, borderRadius: 16, padding: 28 }}>
          <label style={{ display: 'block', fontSize: 13, color: '#cfc6b3', marginBottom: 7, fontWeight: 600 }}>البريد الإلكتروني</label>
          <input value={email} onChange={e => setEmail(e.target.value)} placeholder="name@mamnoon.com" className="focus-ring"
            style={{ width: '100%', padding: '12px 14px', borderRadius: 9, border: `1px solid ${COLORS.border}`, background: COLORS.bgAlt, color: COLORS.cream, fontSize: 15, marginBottom: 18 }} />

          <label style={{ display: 'block', fontSize: 13, color: '#cfc6b3', marginBottom: 7, fontWeight: 600 }}>كلمة السر</label>
          <div style={{ position: 'relative', marginBottom: 8 }}>
            <input type={showPw ? 'text' : 'password'} value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" className="focus-ring"
              style={{ width: '100%', padding: '12px 14px', borderRadius: 9, border: `1px solid ${COLORS.border}`, background: COLORS.bgAlt, color: COLORS.cream, fontSize: 15 }} />
            <button type="button" onClick={() => setShowPw(s => !s)} style={{ position: 'absolute', insetInlineStart: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: '#8a8275', padding: 4 }}>
              {showPw ? <EyeOff size={17} /> : <Eye size={17} />}
            </button>
          </div>
          <div style={{ fontSize: 12, color: '#6e675c', marginBottom: 18 }}>{roleConfig[role].hint}</div>

          {error && <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: '#e0a0a0', fontSize: 13, marginBottom: 16, background: 'rgba(156,59,59,0.15)', padding: '9px 12px', borderRadius: 8 }}><AlertCircle size={15} /> {error}</div>}

          <button type="submit" className="focus-ring" style={{ width: '100%', background: COLORS.gold, color: COLORS.bg, border: 'none', padding: '13px', borderRadius: 10, fontWeight: 800, fontSize: 15.5, cursor: 'pointer' }}>دخول</button>
        </form>

        {role === 'admin' && (
          <div style={{ marginTop: 16, textAlign: 'center', fontSize: 12, color: '#5a5448' }}>
            admin@mamnoon.com / Mamnoon@2026
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------- OVERVIEW ---------- */
function AdminOverview({ students, teachers, parents, payments, setNav }) {
  const activeStudents = students.filter(s => s.active !== false);
  const monthlyRevenue = activeStudents.reduce((sum, s) => sum + pkgOf(s.package).price, 0);
  const monthlyAcademyShare = activeStudents.reduce((sum, s) => {
    const t = teachers.find(t => t.id === s.teacherId);
    return sum + teacherSplit(t, s.package).academyShare;
  }, 0);
  const overdue = activeStudents.filter(s => paymentStatus(s) === 'overdue');
  const dueSoonOrGrace = activeStudents.filter(s => paymentStatus(s) === 'grace');

  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(190px,1fr))', gap: 14, marginBottom: 28 }}>
        <StatCard icon={Users} label="طلاب نشطون" value={activeStudents.length} />
        <StatCard icon={GraduationCap} label="معلمون" value={teachers.length} accent={COLORS.green} />
        <StatCard icon={Wallet} label="إيراد الشهر (متوقع)" value={`${monthlyRevenue.toLocaleString('ar-EG')} ج`} accent={COLORS.gold} />
        <StatCard icon={TrendingUp} label="نصيب الأكاديمية" value={`${monthlyAcademyShare.toLocaleString('ar-EG')} ج`} accent="#7a8f5a" />
      </div>

      {(overdue.length > 0 || dueSoonOrGrace.length > 0) && (
        <div style={{ background: '#fff', border: '1px solid #e8e0cf', borderRadius: 14, padding: 20, marginBottom: 24 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontWeight: 800, fontSize: 15 }}><AlertCircle size={17} color={COLORS.red} /> يحتاجون متابعة الدفع</div>
            <button onClick={() => setNav('payments')} className="focus-ring" style={{ background: 'none', border: 'none', color: COLORS.gold, fontSize: 13, fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }}>عرض الكل <ChevronRight size={14} style={{ transform: 'scaleX(-1)' }} /></button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {[...overdue, ...dueSoonOrGrace].slice(0, 5).map(s => (
              <div key={s.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 12px', background: '#fbf9f2', borderRadius: 9 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{s.name}</span>
                  <Pill tone={paymentStatus(s) === 'overdue' ? 'bad' : 'warn'}>{paymentStatus(s) === 'overdue' ? 'متأخر' : 'قارب الاستحقاق'}</Pill>
                </div>
                <span style={{ fontSize: 12.5, color: '#8a7f68' }}>آخر دفعة: {formatDate(s.lastPaymentDate)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ background: '#fff', border: '1px solid #e8e0cf', borderRadius: 14, padding: 20 }}>
        <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 14 }}>توزيع الطلاب على المعلمين</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {teachers.map(t => {
            const count = activeStudents.filter(s => s.teacherId === t.id).length;
            const earning = activeStudents.filter(s => s.teacherId === t.id).reduce((sum, s) => sum + teacherSplit(t, s.package).teacherShare, 0);
            return (
              <div key={t.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '11px 12px', background: '#fbf9f2', borderRadius: 9 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 32, height: 32, borderRadius: 8, background: COLORS.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', color: COLORS.gold, fontWeight: 800, fontSize: 13 }}>{t.name[0]}</div>
                  <div><div style={{ fontWeight: 700, fontSize: 13.5 }}>{t.name}</div><div style={{ fontSize: 11.5, color: '#9a9176' }}>{count} طالب</div></div>
                </div>
                <div style={{ fontWeight: 800, fontSize: 14, color: '#2d5a3a' }}>{earning.toLocaleString('ar-EG')} ج / شهر</div>
              </div>
            );
          })}
          {teachers.length === 0 && <div style={{ color: '#9a9176', fontSize: 13.5, textAlign: 'center', padding: 20 }}>لا يوجد معلمون مسجّلون بعد</div>}
        </div>
      </div>
    </div>
  );
}

/* ---------- STUDENTS ---------- */
function AdminStudents({ students, setStudents, teachers, parents, setParents, payments, setPayments }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState('');
  const [newCreds, setNewCreds] = useState(null); // { studentEmail, studentPw, parentEmail, parentPw, isNewParent }

  const filtered = students.filter(s => s.name.toLowerCase().includes(search.toLowerCase()));

  function handleAdd(data) {
    const allStudentEmails = students.map(s => s.email);
    const allParentEmails = parents.map(p => p.email);
    const studentId = uid('s');
    const studentEmail = genEmail(data.name, 'mamnoon-students.com', allStudentEmails);
    const studentPw = genPassword();

    let parentId = data.existingParentId;
    let parentEmail = null, parentPw = null, isNewParent = false;

    if (!parentId && data.parentName) {
      parentId = uid('p');
      parentEmail = genEmail(data.parentName, 'mamnoon-family.com', allParentEmails);
      parentPw = genPassword();
      isNewParent = true;
      setParents(prev => [...prev, {
        id: parentId, name: data.parentName, phone: data.parentPhone || '',
        email: parentEmail, password: parentPw, studentIds: [studentId], createdAt: new Date().toISOString(),
      }]);
    } else if (parentId) {
      setParents(prev => prev.map(p => p.id === parentId ? { ...p, studentIds: [...p.studentIds, studentId] } : p));
    }

    const newStudent = {
      id: studentId, name: data.name, age: Number(data.age) || null,
      email: studentEmail, password: studentPw,
      parentId: parentId || null, teacherId: data.teacherId || null, package: data.package,
      zoomLink: data.zoomLink || '', currentSurah: data.currentSurah || 'لم يبدأ بعد',
      memorizedPages: 0, totalPagesTarget: 20,
      lastPaymentDate: data.markPaidNow ? new Date().toISOString() : null,
      joinedAt: new Date().toISOString(), active: true,
    };
    setStudents(prev => [...prev, newStudent]);

    if (data.markPaidNow) {
      const t = teachers.find(t => t.id === data.teacherId);
      const split = teacherSplit(t, data.package);
      setPayments(prev => [...prev, {
        id: uid('pay'), studentId, amount: split.total, teacherShare: split.teacherShare, academyShare: split.academyShare,
        method: 'فودافون كاش', recordedBy: 'تلقائي عند التسجيل', date: new Date().toISOString(),
      }]);
    }

    setNewCreds({
      studentName: data.name, studentEmail, studentPw,
      parentEmail: parentEmail || (parents.find(p => p.id === parentId)?.email), parentPw, isNewParent,
    });
    setShowAdd(false);
  }

  function handleUpdate(id, patch) { setStudents(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s)); }
  function handleDelete(id) {
    if (!confirm('متأكد من حذف هذا الطالب؟ لا يمكن التراجع عن هذا الإجراء.')) return;
    setStudents(prev => prev.filter(s => s.id !== id));
  }

  return (
    <div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 18, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 200, position: 'relative' }}>
          <Search size={15} style={{ position: 'absolute', insetInlineStart: 12, top: '50%', transform: 'translateY(-50%)', color: '#9a9176' }} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="بحث باسم الطالب..." className="focus-ring"
            style={{ ...inputStyle, paddingInlineStart: 36 }} />
        </div>
        <button onClick={() => setShowAdd(true)} className="focus-ring" style={{ background: COLORS.bg, color: COLORS.cream, border: 'none', borderRadius: 9, padding: '10px 18px', fontWeight: 700, fontSize: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 7 }}>
          <Plus size={16} /> إضافة طالب
        </button>
      </div>

      <div style={{ background: '#fff', borderRadius: 14, border: '1px solid #e8e0cf', overflow: 'hidden' }}>
        <table>
          <thead>
            <tr style={{ background: '#fbf9f2', borderBottom: '1px solid #e8e0cf' }}>
              {['الطالب', 'المعلم', 'الباقة', 'التقدم', 'حالة الدفع', ''].map((h, i) => (
                <th key={i} style={{ padding: '12px 16px', textAlign: 'right', fontSize: 12.5, color: '#8a7f68', fontWeight: 700 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(s => {
              const teacher = teachers.find(t => t.id === s.teacherId);
              const status = paymentStatus(s);
              return (
                <tr key={s.id} style={{ borderBottom: '1px solid #f0ead9' }}>
                  <td style={{ padding: '13px 16px' }}>
                    <div style={{ fontWeight: 700, fontSize: 14, color: COLORS.ink }}>{s.name}</div>
                    <div style={{ fontSize: 11.5, color: '#9a9176' }}>{s.age ? `${s.age} سنوات` : ''} · {s.email}</div>
                  </td>
                  <td style={{ padding: '13px 16px', fontSize: 13.5 }}>{teacher ? teacher.name : <span style={{ color: '#c08a8a' }}>غير معيّن</span>}</td>
                  <td style={{ padding: '13px 16px' }}><Pill tone="gold">{pkgOf(s.package).label}</Pill></td>
                  <td style={{ padding: '13px 16px', fontSize: 13 }}>{s.memorizedPages} / {s.totalPagesTarget} صفحة</td>
                  <td style={{ padding: '13px 16px' }}>
                    <Pill tone={status === 'paid' ? 'good' : status === 'grace' ? 'warn' : 'bad'}>
                      {status === 'paid' ? 'مدفوع' : status === 'grace' ? 'قارب الاستحقاق' : status === 'overdue' ? 'متأخر' : 'لم يُدفع'}
                    </Pill>
                  </td>
                  <td style={{ padding: '13px 16px' }}>
                    <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                      <IconButton icon={Edit3} onClick={() => setEditing(s)} title="تعديل" />
                      <IconButton icon={Trash2} tone="danger" onClick={() => handleDelete(s.id)} title="حذف" />
                    </div>
                  </td>
                </tr>
              );
            })}
            {filtered.length === 0 && <tr><td colSpan={6} style={{ padding: 30, textAlign: 'center', color: '#9a9176', fontSize: 13.5 }}>لا يوجد طلاب مطابقون</td></tr>}
          </tbody>
        </table>
      </div>

      {showAdd && <AddStudentModal onClose={() => setShowAdd(false)} onSubmit={handleAdd} teachers={teachers} parents={parents} />}
      {editing && <EditStudentModal student={editing} teachers={teachers} onClose={() => setEditing(null)} onSave={patch => { handleUpdate(editing.id, patch); setEditing(null); }} />}
      {newCreds && <NewCredentialsModal creds={newCreds} onClose={() => setNewCreds(null)} />}
    </div>
  );
}

function AddStudentModal({ onClose, onSubmit, teachers, parents }) {
  const [name, setName] = useState('');
  const [age, setAge] = useState('');
  const [teacherId, setTeacherId] = useState(teachers[0]?.id || '');
  const [pkg, setPkg] = useState('basic');
  const [zoomLink, setZoomLink] = useState('');
  const [currentSurah, setCurrentSurah] = useState('');
  const [parentMode, setParentMode] = useState('new'); // new | existing
  const [existingParentId, setExistingParentId] = useState(parents[0]?.id || '');
  const [parentName, setParentName] = useState('');
  const [parentPhone, setParentPhone] = useState('');
  const [markPaidNow, setMarkPaidNow] = useState(false);

  function submit(e) {
    e.preventDefault();
    if (!name.trim()) return;
    onSubmit({
      name: name.trim(), age, teacherId, package: pkg, zoomLink, currentSurah, markPaidNow,
      existingParentId: parentMode === 'existing' ? existingParentId : null,
      parentName: parentMode === 'new' ? parentName.trim() : null,
      parentPhone: parentMode === 'new' ? parentPhone.trim() : null,
    });
  }

  return (
    <Modal title="إضافة طالب جديد" onClose={onClose} width={520}>
      <form onSubmit={submit}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 110px', gap: 12 }}>
          <FormField label="اسم الطالب"><input value={name} onChange={e => setName(e.target.value)} className="focus-ring" style={inputStyle} required /></FormField>
          <FormField label="السن"><input value={age} onChange={e => setAge(e.target.value)} type="number" className="focus-ring" style={inputStyle} /></FormField>
        </div>

        <FormField label="المعلم المسؤول">
          <select value={teacherId} onChange={e => setTeacherId(e.target.value)} className="focus-ring" style={inputStyle}>
            <option value="">— بدون تعيين الآن —</option>
            {teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </FormField>

        <FormField label="الباقة">
          <div style={{ display: 'flex', gap: 10 }}>
            {Object.values(PACKAGES).map(p => (
              <button key={p.id} type="button" onClick={() => setPkg(p.id)} className="focus-ring" style={{
                flex: 1, padding: '10px', borderRadius: 9, border: pkg === p.id ? `2px solid ${COLORS.gold}` : '1px solid #e0d8c4',
                background: pkg === p.id ? COLORS.goldDim : '#fbf9f2', cursor: 'pointer', textAlign: 'center',
              }}>
                <div style={{ fontWeight: 700, fontSize: 13 }}>{p.label}</div>
                <div style={{ fontSize: 12, color: '#8a7f68' }}>{p.sessions} حصص · {p.price} ج</div>
              </button>
            ))}
          </div>
        </FormField>

        <FormField label="رابط الحصة (زووم / ميت)" hint="يمكن إضافته أو تعديله لاحقاً من ملف الطالب">
          <input value={zoomLink} onChange={e => setZoomLink(e.target.value)} placeholder="https://zoom.us/j/..." className="focus-ring" style={inputStyle} />
        </FormField>

        <FormField label="السورة الحالية (اختياري)"><input value={currentSurah} onChange={e => setCurrentSurah(e.target.value)} className="focus-ring" style={inputStyle} /></FormField>

        <div style={{ height: 1, background: '#f0ead9', margin: '18px 0' }} />

        <FormField label="ولي الأمر">
          <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
            <button type="button" onClick={() => setParentMode('new')} className="focus-ring" style={{ flex: 1, padding: '8px', borderRadius: 8, border: 'none', cursor: 'pointer', background: parentMode === 'new' ? COLORS.bg : '#f3eee0', color: parentMode === 'new' ? '#fff' : '#5a5340', fontWeight: 700, fontSize: 12.5 }}>ولي أمر جديد</button>
            <button type="button" onClick={() => setParentMode('existing')} className="focus-ring" style={{ flex: 1, padding: '8px', borderRadius: 8, border: 'none', cursor: 'pointer', background: parentMode === 'existing' ? COLORS.bg : '#f3eee0', color: parentMode === 'existing' ? '#fff' : '#5a5340', fontWeight: 700, fontSize: 12.5 }}>ربط بولي أمر موجود</button>
          </div>
          {parentMode === 'new' ? (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <input value={parentName} onChange={e => setParentName(e.target.value)} placeholder="اسم ولي الأمر" className="focus-ring" style={inputStyle} />
              <input value={parentPhone} onChange={e => setParentPhone(e.target.value)} placeholder="رقم الهاتف" className="focus-ring" style={inputStyle} />
            </div>
          ) : (
            <select value={existingParentId} onChange={e => setExistingParentId(e.target.value)} className="focus-ring" style={inputStyle}>
              {parents.length === 0 && <option value="">لا يوجد أولياء أمور مسجّلون</option>}
              {parents.map(p => <option key={p.id} value={p.id}>{p.name} — {p.phone}</option>)}
            </select>
          )}
        </FormField>

        <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: '#4a4434', fontWeight: 600, marginBottom: 18, cursor: 'pointer' }}>
          <input type="checkbox" checked={markPaidNow} onChange={e => setMarkPaidNow(e.target.checked)} /> تم استلام دفعة الشهر الأول الآن (فودافون كاش)
        </label>

        <div style={{ display: 'flex', gap: 10 }}>
          <button type="button" onClick={onClose} className="focus-ring" style={{ flex: 1, padding: '11px', borderRadius: 9, border: '1px solid #e0d8c4', background: '#fff', cursor: 'pointer', fontWeight: 700, fontSize: 14 }}>إلغاء</button>
          <button type="submit" className="focus-ring" style={{ flex: 2, padding: '11px', borderRadius: 9, border: 'none', background: COLORS.gold, color: COLORS.bg, cursor: 'pointer', fontWeight: 800, fontSize: 14 }}>إضافة الطالب</button>
        </div>
      </form>
    </Modal>
  );
}

          <button type="submit" className="focus-ring" style={{ flex: 2, padding: '11px', borderRadius: 9, border: 'none', background: COLORS.gold, color: COLORS.bg, cursor: 'pointer', fontWeight: 800, fontSize: 14 }}>حفظ التعديلات</button>

/* ---------- TEACHERS ---------- */
function AdminTeachers({ teachers, setTeachers, students, payments }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [newCreds, setNewCreds] = useState(null);

  function handleAdd(data) {
    const email = genEmail(data.name, 'mamnoon-teachers.com', teachers.map(t => t.email));
    const password = genPassword();
    const newTeacher = { id: uid('t'), name: data.name, phone: data.phone, email, password, bio: data.bio, sharePercent: Number(data.sharePercent), active: true, createdAt: new Date().toISOString() };
    setTeachers(prev => [...prev, newTeacher]);
    setNewCreds({ name: data.name, email, password });
    setShowAdd(false);
  }
  function handleUpdate(id, patch) { setTeachers(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t)); }
  function handleDelete(id) {
    const count = students.filter(s => s.teacherId === id).length;
    if (count > 0) { alert(`لا يمكن حذف هذا المعلم، لديه ${count} طالب مرتبط به. أعد تعيين طلابه أولاً.`); return; }
    if (!confirm('متأكد من حذف هذا المعلم؟')) return;
    setTeachers(prev => prev.filter(t => t.id !== id));
  }

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 18 }}>
        <button onClick={() => setShowAdd(true)} className="focus-ring" style={{ background: COLORS.bg, color: COLORS.cream, border: 'none', borderRadius: 9, padding: '10px 18px', fontWeight: 700, fontSize: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 7 }}>
          <Plus size={16} /> إضافة معلم
        </button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(310px,1fr))', gap: 14 }}>
        {teachers.map(t => {
          const myStudents = students.filter(s => s.teacherId === t.id && s.active !== false);
          const monthlyEarning = myStudents.reduce((sum, s) => sum + teacherSplit(t, s.package).teacherShare, 0);
          return (
            <div key={t.id} style={{ background: '#fff', border: '1px solid #e8e0cf', borderRadius: 14, padding: 20 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
                <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                  <div style={{ width: 42, height: 42, borderRadius: 10, background: COLORS.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', color: COLORS.gold, fontWeight: 800, fontSize: 16 }}>{t.name[0]}</div>
                  <div><div style={{ fontWeight: 800, fontSize: 15, color: COLORS.ink }}>{t.name}</div><div style={{ fontSize: 12, color: '#9a9176' }}>{t.email}</div></div>
                </div>
                <div style={{ display: 'flex', gap: 6 }}>
                  <IconButton icon={Edit3} onClick={() => setEditing(t)} title="تعديل" />
                  <IconButton icon={Trash2} tone="danger" onClick={() => handleDelete(t.id)} title="حذف" />
                </div>
              </div>
              <p style={{ fontSize: 12.5, color: '#8a7f68', lineHeight: 1.6, margin: '0 0 14px' }}>{t.bio}</p>
              <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                <Pill tone="gold">نسبته {t.sharePercent}%</Pill>
                <Pill tone="neutral">{myStudents.length} طالب</Pill>
              </div>
              <div style={{ background: '#fbf9f2', borderRadius: 9, padding: '10px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 12.5, color: '#8a7f68' }}>دخله الشهري المتوقع</span>
                <span style={{ fontWeight: 800, fontSize: 15, color: '#2d5a3a' }}>{monthlyEarning.toLocaleString('ar-EG')} ج</span>
              </div>
            </div>
          );
        })}
        {teachers.length === 0 && <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: 40, color: '#9a9176' }}>لا يوجد معلمون مسجّلون بعد</div>}

        <Modal title="تم إضافة المعلم" onClose={() => setNewCreds(null)} width={440}>

    const newPw = genPassword();
    setParents(prev => prev.map(p => p.id === parentId ? { ...p, password: newPw } : p));
    setResetFor({ parent: parents.find(p => p.id === parentId), newPw });

  return (
    <div>

          <button onClick={() => setResetFor(null)} className="focus-ring" style={{ width: '100%', marginTop: 16, padding: '11px', borderRadius: 9, border: 'none', background: COLORS.bg, color: COLORS.cream, cursor: 'pointer', fontWeight: 700 }}>تم</button>
        </Modal>
      )}
    </div>
  );
}

/* ---------- PAYMENTS ---------- */
function AdminPayments({ students, setStudents, teachers, payments, setPayments }) {
  const [showAdd, setShowAdd] = useState(false);
  const [filter, setFilter] = useState('all'); // all | overdue | grace | paid

  const activeStudents = students.filter(s => s.active !== false);
  const filteredStudents = activeStudents.filter(s => filter === 'all' || paymentStatus(s) === filter);

  function recordPayment(studentId, manualAmount) {
    const student = students.find(s => s.id === studentId);
    const teacher = teachers.find(t => t.id === student.teacherId);
    const split = teacherSplit(teacher, student.package);
    const amount = manualAmount ? Number(manualAmount) : split.total;
    const teacherShare = manualAmount ? Math.round((amount * (teacher?.sharePercent || 60)) / 100) : split.teacherShare;

    setPayments(prev => [...prev, {
      id: uid('pay'), studentId, amount, teacherShare, academyShare: amount - teacherShare,
      method: 'فودافون كاش', recordedBy: manualAmount ? 'يدوي' : 'تلقائي', date: new Date().toISOString(),
    }]);
    setStudents(prev => prev.map(s => s.id === studentId ? { ...s, lastPaymentDate: new Date().toISOString() } : s));
  }

  const recentPayments = [...payments].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 8);

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap' }}>
        {[{ k: 'all', l: 'الكل' }, { k: 'overdue', l: 'متأخر' }, { k: 'grace', l: 'قارب الاستحقاق' }, { k: 'paid', l: 'مدفوع' }].map(f => (
          <button key={f.k} onClick={() => setFilter(f.k)} className="focus-ring" style={{
            padding: '8px 16px', borderRadius: 999, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 700,
            background: filter === f.k ? COLORS.bg : '#f3eee0', color: filter === f.k ? '#fff' : '#5a5340',
          }}>{f.l}</button>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 18, alignItems: 'flex-start' }}>
        <div style={{ background: '#fff', borderRadius: 14, border: '1px solid #e8e0cf', overflow: 'hidden' }}>
          <table>
            <thead>
              <tr style={{ background: '#fbf9f2', borderBottom: '1px solid #e8e0cf' }}>
                {['الطالب', 'الباقة', 'آخر دفعة', 'الحالة', ''].map((h, i) => <th key={i} style={{ padding: '12px 14px', textAlign: 'right', fontSize: 12, color: '#8a7f68', fontWeight: 700 }}>{h}</th>)}
              </tr>
            </thead>
            <tbody>
              {filteredStudents.map(s => {
                const status = paymentStatus(s);
                return (
                  <tr key={s.id} style={{ borderBottom: '1px solid #f0ead9' }}>
                    <td style={{ padding: '12px 14px', fontWeight: 700, fontSize: 13.5 }}>{s.name}</td>
                    <td style={{ padding: '12px 14px', fontSize: 12.5 }}>{pkgOf(s.package).price} ج</td>
                    <td style={{ padding: '12px 14px', fontSize: 12.5, color: '#8a7f68' }}>{formatDate(s.lastPaymentDate)}</td>
                    <td style={{ padding: '12px 14px' }}><Pill tone={status === 'paid' ? 'good' : status === 'grace' ? 'warn' : 'bad'}>{status === 'paid' ? 'مدفوع' : status === 'grace' ? 'قارب' : 'متأخر'}</Pill></td>
                    <td style={{ padding: '12px 14px' }}>
                      <button onClick={() => recordPayment(s.id)} className="focus-ring" style={{ background: COLORS.goldDim, border: 'none', borderRadius: 8, padding: '6px 12px', cursor: 'pointer', fontSize: 12, fontWeight: 700, color: '#8a6a2e' }}>تسجيل دفعة</button>
                    </td>
                  </tr>
                );
              })}
              {filteredStudents.length === 0 && <tr><td colSpan={5} style={{ padding: 26, textAlign: 'center', color: '#9a9176', fontSize: 13 }}>لا يوجد طلاب في هذا التصنيف</td></tr>}
            </tbody>
          </table>
        </div>

        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <div style={{ fontWeight: 800, fontSize: 14.5 }}>سجل آخر المدفوعات</div>
            <button onClick={() => setShowAdd(true)} className="focus-ring" style={{ background: 'none', border: 'none', color: COLORS.gold, fontSize: 12.5, fontWeight: 700, cursor: 'pointer' }}>+ تسجيل يدوي</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {recentPayments.map(p => {
              const student = students.find(s => s.id === p.studentId);
              return (
                <div key={p.id} style={{ background: '#fff', border: '1px solid #e8e0cf', borderRadius: 10, padding: '10px 13px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                    <span style={{ fontWeight: 700, fontSize: 13 }}>{student?.name || 'طالب محذوف'}</span>
                    <span style={{ fontWeight: 800, fontSize: 13.5, color: '#2d5a3a' }}>{p.amount} ج</span>
                  </div>
                  <div style={{ fontSize: 11, color: '#9a9176', display: 'flex', justifyContent: 'space-between' }}>
                    <span>{p.method} · {p.recordedBy}</span><span>{formatDateTime(p.date)}</span>
                  </div>
                </div>
              );
            })}
            {recentPayments.length === 0 && <div style={{ fontSize: 12.5, color: '#9a9176', textAlign: 'center', padding: 16 }}>لا توجد مدفوعات مسجّلة بعد</div>}
          </div>
        </div>
      </div>

      {showAdd && <ManualPaymentModal students={students} onClose={() => setShowAdd(false)} onSubmit={(studentId, amount) => { recordPayment(studentId, amount); setShowAdd(false); }} />}
    </div>
  );
}

function TeacherDashboard({ teacher, students, setStudents, sessions, setSessions, onLogout }) {
  const [nav, setNav] = useState('students');
  const [logging, setLogging] = useState(null); // student being logged for a session

  const navItems = [
    { key: 'students', label: 'طلابي', icon: Users },
    { key: 'history', label: 'سجل الحصص', icon: CalendarDays },
    { key: 'earnings', label: 'أرباحي', icon: Wallet },
  ];

  const myStudents = students.filter(s => s.teacherId === teacher.id && s.active !== false);
  const mySessions = sessions.filter(se => se.teacherId === teacher.id);
  const monthlyEarning = myStudents.reduce((sum, s) => sum + teacherSplit(teacher, s.package).teacherShare, 0);

  function logSession(studentId, data) {
    setSessions(prev => [...prev, { id: uid('sess'), studentId, teacherId: teacher.id, date: new Date().toISOString(), ...data }]);
    if (data.newSurah || data.newPages != null) {
      setStudents(prev => prev.map(s => s.id === studentId ? {
        ...s,
        currentSurah: data.newSurah || s.currentSurah,
        memorizedPages: data.newPages != null ? data.newPages : s.memorizedPages,
      } : s));
    }
    setLogging(null);
  }

    students: ['طلابي', `${myStudents.length} طالب مسجّل تحت إشرافك`],
    history: ['سجل الحصص', 'كل الحصص اللي سجّلتها لطلابك'],
    earnings: ['أرباحي', 'تفاصيل دخلك من كل طالب هذا الشهر'],
  };

  return (
    <DashboardShell title={titles[nav][0]} subtitle={titles[nav][1]} roleLabel={`المعلم · ${teacher.name}`} navItems={navItems} activeNav={nav} setActiveNav={setNav} onLogout={onLogout}>
      {nav === 'students' && (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(280px,1fr))', gap: 14 }}>

            <div key={s.id} style={{ background: '#fff', border: '1px solid #e8e0cf', borderRadius: 14, padding: 18 }}>
              <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 12 }}>
                <SealMark size={48} pct={(s.memorizedPages / (s.totalPagesTarget || 20)) * 100} />
                <div>
                  <div style={{ fontWeight: 800, fontSize: 15 }}>{s.name}</div>
                  <div style={{ fontSize: 12, color: '#9a9176' }}>{s.currentSurah}</div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                <Pill tone="gold">{pkgOf(s.package).label}</Pill>
                <Pill tone="neutral">{s.memorizedPages} صفحة محفوظة</Pill>
              </div>
              {s.zoomLink ? (
                <a href={s.zoomLink} target="_blank" rel="noopener noreferrer" className="focus-ring" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, background: COLORS.goldDim, color: '#8a6a2e', padding: '9px', borderRadius: 9, fontSize: 13, fontWeight: 700, textDecoration: 'none', marginBottom: 8 }}>

                <div style={{ textAlign: 'center', fontSize: 12, color: '#c08a8a', marginBottom: 8 }}>لا يوجد رابط حصة — تواصل مع الأدمن</div>
              )}
              <button onClick={() => setLogging(s)} className="focus-ring" style={{ width: '100%', background: COLORS.bg, color: COLORS.cream, border: 'none', padding: '9px', borderRadius: 9, fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>تسجيل حصة اليوم</button>
            </div>
          ))}
          {myStudents.length === 0 && <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: 40, color: '#9a9176' }}>لا يوجد طلاب معيّنون لك حالياً</div>}

                  <tr key={se.id} style={{ borderBottom: '1px solid #f0ead9' }}>

              <tbody>
                {myStudents.map(s => {
                  const split = teacherSplit(teacher, s.package);
                  return (
                    <tr key={s.id} style={{ borderBottom: '1px solid #f0ead9' }}>
                      <td style={{ padding: '11px 14px', fontWeight: 700, fontSize: 13 }}>{s.name}</td>
                      <td style={{ padding: '11px 14px', fontSize: 12.5 }}>{pkgOf(s.package).label}</td>
                      <td style={{ padding: '11px 14px', fontSize: 12.5 }}>{teacher.sharePercent}%</td>

                })}
              </tbody>

          </div>
        </div>
      )}

      {logging && <LogSessionModal student={logging} onClose={() => setLogging(null)} onSubmit={data => logSession(logging.id, data)} />}
    </DashboardShell>
  );
}

function LogSessionModal({ student, onClose, onSubmit }) {
  const [attended, setAttended] = useState(true);
  const [notes, setNotes] = useState('');
  const [newSurah, setNewSurah] = useState(student.currentSurah || '');
  const [newPages, setNewPages] = useState(student.memorizedPages || 0);

  function submit(e) { e.preventDefault(); onSubmit({ attended, notes, newSurah, newPages: Number(newPages) }); }

  return (
    <Modal title={`تسجيل حصة: ${student.name}`} onClose={onClose} width={460}>
      <form onSubmit={submit}>
        <FormField label="هل حضر الطالب؟">
          <div style={{ display: 'flex', gap: 8 }}>
            <button type="button" onClick={() => setAttended(true)} className="focus-ring" style={{ flex: 1, padding: '10px', borderRadius: 9, border: 'none', cursor: 'pointer', background: attended ? '#e3eee3' : '#f3eee0', color: attended ? '#2d5a3a' : '#5a5340', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}><CheckCircle2 size={15} /> حضر</button>
            <button type="button" onClick={() => setAttended(false)} className="focus-ring" style={{ flex: 1, padding: '10px', borderRadius: 9, border: 'none', cursor: 'pointer', background: !attended ? COLORS.redBg : '#f3eee0', color: !attended ? COLORS.red : '#5a5340', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}><XCircle size={15} /> غاب</button>
          </div>
        </FormField>
        <FormField label="السورة الحالية"><input value={newSurah} onChange={e => setNewSurah(e.target.value)} className="focus-ring" style={inputStyle} /></FormField>
        <FormField label="إجمالي الصفحات المحفوظة الآن"><input type="number" value={newPages} onChange={e => setNewPages(e.target.value)} className="focus-ring" style={inputStyle} /></FormField>
        <FormField label="ملاحظات لولي الأمر (اختياري)"><textarea value={notes} onChange={e => setNotes(e.target.value)} rows={3} placeholder="مثال: تلاوة ممتازة اليوم، يحتاج مراجعة آية 12-15" className="focus-ring" style={{ ...inputStyle, resize: 'vertical' }} /></FormField>
        <div style={{ display: 'flex', gap: 10, marginTop: 4 }}>
          <button type="button" onClick={onClose} className="focus-ring" style={{ flex: 1, padding: '11px', borderRadius: 9, border: '1px solid #e0d8c4', background: '#fff', cursor: 'pointer', fontWeight: 700 }}>إلغاء</button>
          <button type="submit" className="focus-ring" style={{ flex: 2, padding: '11px', borderRadius: 9, border: 'none', background: COLORS.gold, color: COLORS.bg, cursor: 'pointer', fontWeight: 800 }}>حفظ الحصة</button>
        </div>
      </form>
    </Modal>
  );
}

/* ============================================================
   PARENT DASHBOARD
   ============================================================ */
function ParentDashboard({ parent, students, teachers, payments, sessions, onLogout }) {
  const [nav, setNav] = useState('overview');
  const myKids = students.filter(s => parent.studentIds.includes(s.id));
  const [selectedKid, setSelectedKid] = useState(myKids[0]?.id || null);
  const kid = myKids.find(s => s.id === selectedKid) || myKids[0];

  const navItems = [
    { key: 'overview', label: 'متابعة الحفظ', icon: BookOpen },
    { key: 'sessions', label: 'سجل الحصص', icon: CalendarDays },
    { key: 'billing', label: 'الاشتراك والدفع', icon: Wallet },
  ];

  if (!kid) {
    return (
      <DashboardShell title="متابعة الحفظ" roleLabel={`ولي الأمر · ${parent.name}`} navItems={navItems} activeNav={nav} setActiveNav={setNav} onLogout={onLogout}>
        <div style={{ textAlign: 'center', padding: 60, color: '#9a9176' }}>لا يوجد أبناء مسجّلون مرتبطون بحسابك حالياً. تواصل مع الأدمن.</div>
      </DashboardShell>
    );
  }

  const teacher = teachers.find(t => t.id === kid.teacherId);
  const status = paymentStatus(kid);
  const kidSessions = sessions.filter(se => se.studentId === kid.id);
  const kidPayments = payments.filter(p => p.studentId === kid.id);

  const titles = {
    overview: ['متابعة الحفظ', `تقدّم ${kid.name} في حفظ القرآن الكريم`],
    sessions: ['سجل الحصص', `كل الحصص المسجّلة لـ${kid.name}`],
    billing: ['الاشتراك والدفع', 'تفاصيل الباقة وموعد الدفع القادم'],
  };

  return (
    <DashboardShell title={titles[nav][0]} subtitle={titles[nav][1]} roleLabel={`ولي الأمر · ${parent.name}`} navItems={navItems} activeNav={nav} setActiveNav={setNav} onLogout={onLogout}>
      {myKids.length > 1 && (
        <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
          {myKids.map(k => (
            <button key={k.id} onClick={() => setSelectedKid(k.id)} className="focus-ring" style={{ padding: '8px 16px', borderRadius: 999, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 700, background: selectedKid === k.id ? COLORS.bg : '#f3eee0', color: selectedKid === k.id ? '#fff' : '#5a5340' }}>{k.name}</button>
          ))}
        </div>
      )}

      {nav === 'overview' && (
        <div>
          <div style={{ display: 'flex', gap: 20, alignItems: 'center', background: '#fff', border: '1px solid #e8e0cf', borderRadius: 16, padding: 26, marginBottom: 20, flexWrap: 'wrap' }}>
            <SealMark size={90} pct={(kid.memorizedPages / (kid.totalPagesTarget || 20)) * 100} />
            <div style={{ flex: 1, minWidth: 200 }}>
              <div style={{ fontSize: 19, fontWeight: 800, color: COLORS.ink, marginBottom: 6 }}>{kid.name}</div>
              <div style={{ fontSize: 14, color: '#8a7f68', marginBottom: 10 }}>السورة الحالية: <strong style={{ color: COLORS.ink }}>{kid.currentSurah}</strong></div>
              <div style={{ fontSize: 13, color: '#8a7f68' }}>{kid.memorizedPages} من {kid.totalPagesTarget} صفحة محفوظة</div>
              {teacher && <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 8, fontSize: 13 }}><GraduationCap size={15} color={COLORS.gold} /> المعلم: <strong>{teacher.name}</strong></div>}
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(180px,1fr))', gap: 14 }}>
            <StatCard icon={CalendarDays} label="حصص هذا الشهر" value={kidSessions.length} />
            <StatCard icon={CheckCircle2} label="نسبة الحضور" value={kidSessions.length ? `${Math.round((kidSessions.filter(s => s.attended).length / kidSessions.length) * 100)}%` : '—'} accent={COLORS.green} />
            <StatCard icon={Wallet} label="حالة الدفع" value={status === 'paid' ? 'مدفوع' : status === 'grace' ? 'قارب' : 'متأخر'} accent={status === 'paid' ? '#7a8f5a' : COLORS.red} />
          </div>

          {kidSessions.length > 0 && kidSessions[kidSessions.length - 1].notes && (
            <div style={{ marginTop: 20, background: COLORS.goldDim, border: '1px solid rgba(212,175,106,0.3)', borderRadius: 12, padding: 16 }}>
              <div style={{ fontSize: 12.5, fontWeight: 700, color: '#8a6a2e', marginBottom: 6 }}>آخر ملاحظة من المعلم</div>
              <div style={{ fontSize: 14, color: '#5a4a20', lineHeight: 1.7 }}>{kidSessions[kidSessions.length - 1].notes}</div>
            </div>
          )}
        </div>
      )}

      {nav === 'sessions' && (
        <div style={{ background: '#fff', borderRadius: 14, border: '1px solid #e8e0cf', overflow: 'hidden' }}>
          <table>
            <thead><tr style={{ background: '#fbf9f2', borderBottom: '1px solid #e8e0cf' }}>{['التاريخ', 'الحضور', 'ملاحظات المعلم'].map((h, i) => <th key={i} style={{ padding: '12px 14px', textAlign: 'right', fontSize: 12, color: '#8a7f68', fontWeight: 700 }}>{h}</th>)}</tr></thead>
            <tbody>
              {[...kidSessions].sort((a, b) => new Date(b.date) - new Date(a.date)).map(se => (
                <tr key={se.id} style={{ borderBottom: '1px solid #f0ead9' }}>
                  <td style={{ padding: '11px 14px', fontSize: 13 }}>{formatDateTime(se.date)}</td>
                  <td style={{ padding: '11px 14px' }}><Pill tone={se.attended ? 'good' : 'bad'}>{se.attended ? 'حضر' : 'غاب'}</Pill></td>
                  <td style={{ padding: '11px 14px', fontSize: 13, color: '#8a7f68' }}>{se.notes || '—'}</td>
                </tr>
              ))}
              {kidSessions.length === 0 && <tr><td colSpan={3} style={{ padding: 26, textAlign: 'center', color: '#9a9176' }}>لا توجد حصص مسجّلة بعد</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      {nav === 'billing' && (
        <div>
          <div style={{ background: '#fff', border: '1px solid #e8e0cf', borderRadius: 14, padding: 22, marginBottom: 18 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
              <div><div style={{ fontSize: 13, color: '#8a7f68' }}>الباقة الحالية</div><div style={{ fontSize: 18, fontWeight: 800 }}>{pkgOf(kid.package).label}</div></div>
              <Pill tone={status === 'paid' ? 'good' : status === 'grace' ? 'warn' : 'bad'}>{status === 'paid' ? 'مدفوع' : status === 'grace' ? 'قارب الاستحقاق' : 'متأخر — برجاء السداد'}</Pill>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12 }}>
              <div><div style={{ fontSize: 11.5, color: '#9a9176' }}>الحصص شهرياً</div><div style={{ fontWeight: 700, fontSize: 15 }}>{pkgOf(kid.package).sessions}</div></div>
              <div><div style={{ fontSize: 11.5, color: '#9a9176' }}>السعر الشهري</div><div style={{ fontWeight: 700, fontSize: 15 }}>{pkgOf(kid.package).price} ج</div></div>
              <div><div style={{ fontSize: 11.5, color: '#9a9176' }}>آخر دفعة</div><div style={{ fontWeight: 700, fontSize: 15 }}>{formatDate(kid.lastPaymentDate)}</div></div>
            </div>
            <div style={{ marginTop: 16, padding: '12px 14px', background: '#fbf9f2', borderRadius: 9, fontSize: 13, color: '#5a5340' }}>
              للدفع، حوّل قيمة الاشتراك عبر فودافون كاش على الرقم المعتمد للأكاديمية، ثم تواصل مع الأدمن لتأكيد الدفعة.
            </div>
          </div>
          <div style={{ fontWeight: 800, fontSize: 14.5, marginBottom: 10 }}>سجل المدفوعات</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {[...kidPayments].sort((a, b) => new Date(b.date) - new Date(a.date)).map(p => (
              <div key={p.id} style={{ background: '#fff', border: '1px solid #e8e0cf', borderRadius: 10, padding: '11px 14px', display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 13, color: '#8a7f68' }}>{formatDate(p.date)} · {p.method}</span>
                <span style={{ fontWeight: 800, fontSize: 14, color: '#2d5a3a' }}>{p.amount} ج</span>
              </div>
            ))}
            {kidPayments.length === 0 && <div style={{ fontSize: 13, color: '#9a9176', textAlign: 'center', padding: 16 }}>لا توجد مدفوعات مسجّلة بعد</div>}
          </div>
        </div>
      )}
    </DashboardShell>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
